name: CI
on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          if [ -f pyproject.toml ] && grep -q "\[project\]" pyproject.toml; then pip install -e .; fi
      - name: Run lint
        run: |
          if [ -d backend ]; then
            ruff check backend
          else
            ruff check .
          fi
      - name: Run tests
        env:
          OPENAI_API_KEY: YOUR_API_KEY_HERE
          PYTEST_ADDOPTS: -ra
        run: pytest

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            **/package-lock.json
            **/npm-shrinkwrap.json
      - name: Install dependencies and build
        run: |
          set -e
          TARGET_DIR="."
          if [ -d frontend ] && [ -f frontend/package.json ]; then
            TARGET_DIR="frontend"
          fi
          pushd "$TARGET_DIR" >/dev/null
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build --if-present
          popd >/dev/null
      - name: Prepare assistant.js artifact
        run: |
          set -e
          TARGET_DIR="."
          if [ -d frontend ] && [ -f frontend/package.json ]; then
            TARGET_DIR="frontend"
          fi
          ARTIFACT_PATH=""
          if [ -f "$TARGET_DIR/assistant.js" ]; then
            ARTIFACT_PATH="$TARGET_DIR/assistant.js"
          fi
          if [ -z "$ARTIFACT_PATH" ]; then
            FOUND=$(find "$TARGET_DIR" -maxdepth 5 -type f -name "assistant.js" | head -n 1 || true)
            if [ -n "$FOUND" ]; then
              ARTIFACT_PATH="$FOUND"
            fi
          fi
          if [ -z "$ARTIFACT_PATH" ]; then
            echo "assistant.js not found after build."
            exit 1
          fi
          mkdir -p artifact
          cp "$ARTIFACT_PATH" artifact/assistant.js
      - name: Upload assistant.js artifact
        uses: actions/upload-artifact@v4
        with:
          name: assistant-js
          path: artifact/assistant.js
          if-no-files-found: error

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --tag project-ci-image .
